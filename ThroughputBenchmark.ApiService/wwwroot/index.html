<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Throughput Benchmark</title>
  <style>
    :root { color-scheme: dark; }
    body { font-family: system-ui, sans-serif; margin: 0; background: #0f1115; color: #e6e6e6; }
    header { padding: 1.5rem 2rem; border-bottom: 1px solid #222; }
    h1 { margin: 0; font-size: 1.4rem; }
    a { color: #58a6ff; text-decoration: none; }
    a:hover { text-decoration: underline; }
    main { padding: 2rem; max-width: 1000px; margin: 0 auto; }
    button { font-size: 1rem; padding: 0.7rem 1.6rem; border: 0; border-radius: 8px; cursor: pointer; font-weight: 600; }
    .start { background: #2ea043; color: white; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    .controls { display: flex; gap: 1rem; align-items: center; margin-bottom: 2rem; flex-wrap: wrap; }
    .pill { padding: 0.3rem 0.8rem; border-radius: 999px; font-size: 0.85rem; background: #222; }
    .pill.on { background: #133a1c; color: #4ade80; }
    table { width: 100%; border-collapse: collapse; font-variant-numeric: tabular-nums; }
    th, td { text-align: right; padding: 0.5rem 0.7rem; border-bottom: 1px solid #1c2129; }
    th:first-child, td:first-child { text-align: left; }
    th { color: #8b949e; font-weight: 600; font-size: 0.8rem; }
    tbody tr.clickable { cursor: pointer; }
    tbody tr.clickable:hover { background: #161a22; }
    .muted { color: #8b949e; }
  </style>
</head>
<body>
  <header><h1>⚡ Throughput Benchmark</h1></header>
  <main>
    <div class="controls">
      <button id="start1Btn" class="start" title="Run a fixed 1-minute benchmark, then auto-stop">▶ Run 1 min</button>
      <button id="start20Btn" class="start" title="Run a fixed 20-minute benchmark, then auto-stop">▶ Run 20 min</button>
      <button id="startOpenBtn" class="start" title="Run with no time limit; stop manually">▶ Run (no limit)</button>
      <span id="statusPill" class="pill">idle</span>
      <a id="liveLink" href="#" style="display:none;">view live run →</a>
    </div>

    <h3>Runs <span class="muted" style="font-size:0.85rem; font-weight:400;">(click a run to open its detail)</span></h3>
    <table>
      <thead>
        <tr><th>Started</th><th>Status</th><th>Duration</th><th>Avg processed/sec</th><th>Avg enqueued/sec</th><th>Battery used</th></tr>
      </thead>
      <tbody id="runsRows"><tr><td colspan="6" class="muted">No runs yet.</td></tr></tbody>
    </table>
  </main>

  <script>
    const start1Btn = document.getElementById('start1Btn');
    const start20Btn = document.getElementById('start20Btn');
    const startOpenBtn = document.getElementById('startOpenBtn');
    const statusPill = document.getElementById('statusPill');
    const liveLink = document.getElementById('liveLink');

    function fmt(n) { return n == null ? '—' : Number(n).toLocaleString(); }
    function fmtElapsed(secs) {
      secs = Math.round(secs);
      if (secs < 60) return secs + 's';
      return Math.floor(secs / 60) + 'm ' + (secs % 60) + 's';
    }
    function runBatteryCell(r) {
      if (r.batteryChargedDuringRun)
        return '<span title="Plugged into AC / charged during the run — drain not valid">⚠</span>';
      return r.batteryUsedPercent != null ? r.batteryUsedPercent + '%' : '—';
    }

    // Start a run, then jump straight to its (live) detail page.
    async function startRun(url) {
      try {
        const data = await (await fetch(url, { method: 'POST' })).json();
        if (data.runId) location.href = 'run.html?id=' + data.runId;
      } catch {}
    }
    start1Btn.onclick = () => startRun('/api/benchmark/start?durationSeconds=60');
    start20Btn.onclick = () => startRun('/api/benchmark/start?durationSeconds=1200');
    startOpenBtn.onclick = () => startRun('/api/benchmark/start');

    async function fetchRuns() {
      try {
        const runs = await (await fetch('/api/benchmark/runs')).json();
        const active = runs.find(r => r.isActive);
        const running = !!active;
        start1Btn.disabled = running;
        start20Btn.disabled = running;
        startOpenBtn.disabled = running;
        statusPill.textContent = running ? 'run in progress' : 'idle';
        statusPill.className = running ? 'pill on' : 'pill';
        if (running) { liveLink.style.display = ''; liveLink.href = 'run.html?id=' + active.id; }
        else liveLink.style.display = 'none';

        const el = document.getElementById('runsRows');
        if (!runs.length) { el.innerHTML = '<tr><td colspan="6" class="muted">No runs yet — start one above.</td></tr>'; return; }
        el.innerHTML = runs.map(r => `
          <tr class="clickable" onclick="location.href='run.html?id=${r.id}'">
            <td>${new Date(r.startedAt).toLocaleString()}</td>
            <td>${r.isActive ? 'running (live)' : r.status}</td>
            <td>${fmtElapsed(r.elapsedSeconds)}</td>
            <td>${fmt(r.avgProcessedPerSec)}</td>
            <td>${fmt(r.avgEnqueuedPerSec)}</td>
            <td>${runBatteryCell(r)}</td>
          </tr>`).join('');
      } catch (e) { /* transient */ }
    }

    setInterval(fetchRuns, 2000);
    fetchRuns();
  </script>
</body>
</html>
